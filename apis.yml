description: >-
  CloudAlly (now part of OpenText Cybersecurity) is a SaaS backup and
  recovery service that protects business data in Microsoft 365, Google
  Workspace, Salesforce, Box, Dropbox, SharePoint, and OneDrive. The
  platform offers automated daily backups, point-in-time restore,
  cross-user restore, granular search, and partner-portal multitenancy
  features. Beyond the web console, CloudAlly exposes a REST API at
  api.cloudally.com that lets administrators and partners automate
  backup-task management, restore/download requests, user provisioning,
  partner-portal operations, and billing reporting.
apis:
  - aid: cloudally:cloudally-api
    name: CloudAlly API
    tags:
      - Backup
