      - Partner Portal
      - Restore
      - SaaS Backup
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://api.cloudally.com/documentation
    baseURL: https://api.cloudally.com
    properties:
      - url: https://api.cloudally.com/documentation
        type: Documentation
      - url: https://support.cloudally.com/
        type: Support
      - url: openapi/cloudally-openapi.yml
        type: OpenAPI
    description: >-
      The CloudAlly API is a JSON REST interface at api.cloudally.com.
      Partners authenticate by exchanging a Client ID and Client Secret
      at /auth/partner for an access token, while portal users sign in
      at /auth; the resulting token is presented as an Authorization
      Bearer header. Endpoints expose backup tasks, restore/download
      jobs, partner profile data, billing, resellers, and user
      management. The Partner Portal API today is read-oriented (GET),
      with administrative actions performed via the standard tenant
      endpoints.
