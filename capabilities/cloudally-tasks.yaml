naftiko: 1.0.0-alpha2
info:
  label: CloudAlly API — Tasks
  description: 'CloudAlly API — Tasks. 1 operations. Lead operation: List partner tasks. Self-contained Naftiko capability
    covering one Cloudally business surface.'
  tags:
  - Cloudally
  - Tasks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDALLY_API_KEY: CLOUDALLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloudally-tasks
    baseUri: https://api.cloudally.com
    description: CloudAlly API — Tasks business capability. Self-contained, no shared references.
    resources:
    - name: v1-partners-tasks
      path: /v1/partners/tasks
      operations:
      - name: listpartnertasks
        method: GET
        description: List partner tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLOUDALLY_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloudally-tasks-rest
    port: 8080
    description: REST adapter for CloudAlly API — Tasks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/partners/tasks
      name: v1-partners-tasks
      description: REST surface for v1-partners-tasks.
      operations:
      - method: GET
        name: listpartnertasks
        description: List partner tasks
        call: cloudally-tasks.listpartnertasks
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloudally-tasks-mcp
    port: 9090
    transport: http
    description: MCP adapter for CloudAlly API — Tasks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-partner-tasks
      description: List partner tasks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloudally-tasks.listpartnertasks
      outputParameters:
      - type: object
        mapping: $.
